[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/generate-script"
  to = "/.netlify/functions/generate-script"
  status = 200

[[redirects]]
  from = "/api/webhook/whop"
  to = "/.netlify/functions/whop-webhook"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
